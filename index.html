<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bank AI - Upload Statement</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .card { border: 1px solid #ddd; padding: 16px; border-radius: 8px; max-width: 900px; }
    #out { white-space: pre-wrap; background:#f7f7f7; padding:12px; border-radius:6px; max-height:400px; overflow:auto; }
    table { border-collapse: collapse; width:100%; margin-top:12px; }
    th, td { border:1px solid #eee; padding:8px; text-align:left; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Bank AI</h1>
    <p>Upload a bank statement (PDF or Excel). The app will attempt to extract transactions.</p>

    <input id="file" type="file" accept=".pdf,.xls,.xlsx,.csv" />
    <button id="uploadBtn">Upload</button>

    <h3>Parsed Output</h3>
    <div id="out">No output yet</div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
