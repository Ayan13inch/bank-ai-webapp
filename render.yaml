services:
  - type: web
    name: bank-ai-webapp
    env: docker
    plan: starter
    repo: Ayan13inch/bank-ai-webapp
    branch: main
    dockerfilePath: Dockerfile
    buildCommand: ""
    startCommand: ""
    envVars:
      - key: PORT
        value: "5000"
      - key: FLASK_ENV
        value: "production"
      - key: OPENAI_API_KEY
        value: ""
    autoDeploy: true
